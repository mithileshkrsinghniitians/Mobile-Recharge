name: Build and Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - main

jobs:
  # STAGE 1: Code Quality Gate:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirement.txt bandit pytest pytest-cov pylint

      - name: Run Bandit (static security scan)
        run: bandit -r backend/ -f json -o bandit-report.json --exit-zero

      - name: Run pytest with coverage
        run: pytest tests/ --cov=backend --cov-report=xml:coverage.xml --exit-zero

      - name: Run pylint
        run: pylint backend/ --output-format=text > pylint-report.txt || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # STAGE 2 & 3: Image Security Gate + Deploy:
  deploy:
    runs-on: ubuntu-latest
    needs: code-quality  # only runs if code-quality job passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      # Docker login:
      - name: Login to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin

      # Build and tag image with both commit SHA and latest:
      - name: Build Docker image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          docker build \
            -t ${DOCKER_USERNAME}/mobile-recharge-app:${IMAGE_TAG} \
            -t ${DOCKER_USERNAME}/mobile-recharge-app:latest .

      # Trivy image security scan — blocks push if HIGH/CRITICAL CVEs found:
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/mobile-recharge-app:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      # Push both tags (only reached if Trivy passes):
      - name: Push Docker image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          docker push ${DOCKER_USERNAME}/mobile-recharge-app:${IMAGE_TAG}
          docker push ${DOCKER_USERNAME}/mobile-recharge-app:latest

      # Create docker-compose.yml for EB:
      - name: Create docker-compose.yml for EB
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          cat > docker-compose.yml <<EOF
          version: "3.8"
          services:
            app:
              image: ${DOCKER_USERNAME}/mobile-recharge-app:${IMAGE_TAG}
              ports:
                - "80:8080"
              environment:
                AWS_ACCESS_KEY_ID: \${AWS_ACCESS_KEY_ID}
                AWS_SECRET_ACCESS_KEY: \${AWS_SECRET_ACCESS_KEY}
                AWS_DEFAULT_REGION: \${AWS_DEFAULT_REGION}
                SALESFORCE_CLIENT_ID: \${SALESFORCE_CLIENT_ID}
                SALESFORCE_CLIENT_SECRET: \${SALESFORCE_CLIENT_SECRET}
                SALESFORCE_AUTH_URL: \${SALESFORCE_AUTH_URL}
          EOF

      # Zip for EB:
      - name: Zip bundle
        run: zip deploy.zip docker-compose.yml

      # Deploy to EB:
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@c165ccc34505f88f983d5cb58bfc5acbe7ffd1af
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ secrets.AWS_REGION }}
          application_name: ${{ secrets.EB_APPLICATION_NAME }}
          environment_name: ${{ secrets.EB_ENVIRONMENT_NAME }}
          version_label: ${{ github.sha }}
          deployment_package: deploy.zip
          wait_for_deployment: true
          wait_for_environment_recovery: 120