<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mobile Recharge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>

<!-- Profile Modal -->
<div id="profileModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Verify Mobile Demo</h2>

        <!-- Step 1: Input Mobile UI -->
        <div id="mobileStep">
            <label for="profileMobile">Mobile Number <span class="required">*</span></label>
            <input
                    type="text"
                    id="profileMobile"
                    placeholder="Enter Mobile Number With Country Code"
                    required
            />
        </div>

        <!-- Step 2: Profile Detail -->
        <div id="profileStep" style="display:none;">
            <label for="firstName">First Name <span class="required">*</span></label>
            <input type="text" id="firstName" placeholder="First Name" />

            <label for="lastName">Last Name <span class="required">*</span></label>
            <input type="text" id="lastName" placeholder="Last Name" />

            <label for="email">Email <span class="required">*</span></label>
            <input type="email" id="email" placeholder="Email" />
        </div>

        <p id="profileError" class="error-message"></p>

        <button id="continueBtn" type="button">Continue</button>
        <button id="createProfileBtn" type="button" style="display:none;">
            Create Profile
        </button>
    </div>
</div>

<script src="{{ url_for('static', filename='js/profile.js') }}"></script>

<div class="container">
    <h2>Mobile Recharge Application</h2>

    <label for="mobileNumber">Mobile Number</label>
    <input type="text" id="mobileNumber" placeholder="+3531234567890">
    <small id="mobileError" class="error"></small>

    <label for="amount">Amount (€)</label>
    <input type="text" id="amount" placeholder="10 - 100">
    <small id="amountError" class="error"></small>

    <!-- Stripe Card Section (shown automatically when inputs are valid) -->
    <div id="cardSection" style="display:none; margin-top:20px;">
        <label>Card Details</label>
        <div id="cardElement" class="stripe-card-input"></div>
        <small id="cardErrors" class="error"></small>

        <!-- Captcha verification section — shown when card details are complete -->
        <div id="captchaSection" style="display:none;">
            <div class="captcha-header">
                <span class="captcha-header-icon">🔒</span>
                <div>
                    <p class="captcha-title">Security Verification</p>
                    <p class="captcha-subtitle">Please complete the verification to proceed with payment.</p>
                </div>
            </div>
            <div class="captcha-image-row">
                <img id="captchaImg" src="" alt="Captcha" class="captcha-img" />
                <button id="captchaRefreshBtn" type="button" class="captcha-refresh-btn" title="New captcha">↻</button>
            </div>
            <input type="text" id="captchaInput" placeholder="Enter 5-character captcha" maxlength="5" autocomplete="off" spellcheck="false" />
            <small id="captchaMsg"></small>
        </div>

        <button id="confirmPayBtn" type="button" style="display:none;" disabled>Confirm Payment</button>
    </div>

    <button id="invoiceBtn" style="display:none;">Download Invoice</button>

    <div class="status" id="statusBox">
        <p id="message"></p>
    </div>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

<script>
    const invoiceBtn = document.getElementById("invoiceBtn");
    const confirmPayBtn = document.getElementById("confirmPayBtn");
    let lastPaymentId = null;
    let captchaVerified = false;
    let captchaInitialized = false;

    const API_BASE_URL ="https://3nsivye9u5.execute-api.us-east-1.amazonaws.com/prod";

    // Stripe Initialisation:
    const stripe = Stripe("pk_test_51SuZWVPDaMhpoGKJksordD7CRcNL40baRqPwZjLa8heHX6AdIZyz9pQEKMeklXGJheFACgjYdAv5InxOi7R9aSiW00TEPVhPkW");
    const elements = stripe.elements();
    const cardElement = elements.create("card", {
        style: {
            base: {
                fontSize: "14px",
                color: "#1f2937",
                fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif",
                "::placeholder": { color: "#9ca3af" }
            },
            invalid: { color: "#dc2626" }
        }
    });

    // Mount on page load — visibility controlled by validateInputs() in app.js:
    cardElement.mount("#cardElement");

    // Show reCaptcha when card details are complete:
    cardElement.on("change", function (event) {
        document.getElementById("cardErrors").textContent =
            event.error ? event.error.message : "";

        if (event.complete) {
            document.getElementById("captchaSection").style.display = "block";

            // Show button greyed-out — enabled only after captcha verification:
            confirmPayBtn.style.display = "block";
            confirmPayBtn.disabled = true;
            if (!captchaInitialized) {
                loadCaptcha();
                document.getElementById("captchaInput").addEventListener("input", function () {
                    document.getElementById("captchaMsg").textContent = "";
                    if (this.value.length === 5 && !captchaVerified) verifyCaptcha(this.value);
                });
                document.getElementById("captchaRefreshBtn").addEventListener("click", function () {
                    document.getElementById("captchaInput").value = "";
                    document.getElementById("captchaMsg").textContent = "";
                    loadCaptcha();
                });
                captchaInitialized = true;
            }
        } else {
            document.getElementById("captchaSection").style.display = "none";
            confirmPayBtn.style.display = "none";
            confirmPayBtn.disabled = true;
            captchaVerified = false;
        }
    });

    // Confirm Payment: create intent → confirm with Stripe → finalize:
    confirmPayBtn.addEventListener("click", async () => {
        confirmPayBtn.disabled = true;
        confirmPayBtn.textContent = "Processing...";
        document.getElementById("cardErrors").textContent = "";
        statusBox.classList.add("show");
        message.innerText = "Creating payment...";
        message.style.color = "#1f2937";

        // Disabled inputs while payment processing:
        mobileInput.disabled = true;
        amountInput.disabled = true;

        // Step 1: Create PaymentIntent on backend:
        let clientSecret, stubPiId;
        try {
            const intentResponse = await fetch(`${API_BASE_URL}/payments`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    mobileNumber: mobileInput.value,
                    amount: Number.parseFloat(amountInput.value)
                })
            });

            if (!intentResponse.ok) throw new Error("Failed to create payment intent");

            const intentData = await intentResponse.json();
            lastPaymentId = intentData.paymentId;
            clientSecret = intentData.clientSecret;
            stubPiId = intentData.stripePaymentIntentId || null;

        } catch (error) {
            console.error("Payment intent creation failed:", error);
            message.innerText = "Unable to prepare payment. Retrying in 5 seconds...";
            message.style.color = "#dc2626";
            mobileInput.disabled = false;
            amountInput.disabled = false;
            setTimeout(() => {
                confirmPayBtn.textContent = "Confirm Payment";
                confirmPayBtn.disabled = false;
                message.innerText = "Ready to try again.";
            }, 5000);
            return;
        }

        // Step 2: Confirm card payment — skip Stripe.js if stub is active:
        message.innerText = "Confirming with Stripe...";

        let paymentIntent;
        if (clientSecret && clientSecret.startsWith("seti_STUB_")) {
            // Stripe is unreachable — use stub PI id directly, skip stripe.confirmCardPayment():
            paymentIntent = { id: stubPiId };
        } else {
            const { error, paymentIntent: pi } = await stripe.confirmCardPayment(
                clientSecret,
                { payment_method: { card: cardElement } }
            );
            if (error) {
                document.getElementById("cardErrors").textContent = error.message;
                message.innerText = "Payment failed. Please check your card details.";
                message.style.color = "#dc2626";
                mobileInput.disabled = false;
                amountInput.disabled = false;
                setTimeout(() => {
                    confirmPayBtn.textContent = "Confirm Payment";
                    confirmPayBtn.disabled = false;
                }, 5000);
                return;
            }
            paymentIntent = pi;
        }

        // Step 3: Finalize on backend (update DynamoDB + send SMS):
        message.innerText = "Finalising payment...";

        try {
            const finaliseResponse = await fetch(`${API_BASE_URL}/payments/finalize`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    paymentId: lastPaymentId,
                    stripePaymentIntentId: paymentIntent.id,
                    amount: Number.parseFloat(amountInput.value),
                    mobileNumber: mobileInput.value
                })
            });

            if (!finaliseResponse.ok) throw new Error("Finalise failed");

            const finalData = await finaliseResponse.json();

            message.innerText =
                "Payment successful. Payment ID: " +
                finalData.paymentId +
                " Status: " +
                finalData.status;
            message.style.color = "#065f46";

            if (finalData.status === "SUCCEEDED") {
                invoiceBtn.style.display = "block";
            }

            document.getElementById("cardSection").style.display = "none";

        } catch (err) {
            console.error("Finalise failed:", err);
            message.innerText = "Payment was taken but we could not confirm it. Please contact support.";
            message.style.color = "#dc2626";
        }
    });


    // Invoice button:
    invoiceBtn.addEventListener("click", async () => {
    message.innerText = "Generating invoice...";
    message.style.color = "#2196F3"; // Blue for loading:
    invoiceBtn.disabled = true; // Disable button to prevent double-clicks:

        try {
            const response = await fetch(
                "https://di8irmc06g.execute-api.us-east-1.amazonaws.com/invoice",
                {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        paymentId: lastPaymentId,
                        amount: Number.parseFloat(amountInput.value),
                        mobileNumber: mobileInput.value
                    })
                }
            );

            if (!response.ok) throw new Error("Invoice API failed");

            const data = await response.json();
            console.log("API Response:", data);

            if (data.pdf_url) {
                window.open(data.pdf_url, "_blank");
                message.innerText = "Invoice generated successfully!";
                message.style.color = "#4CAF50"; // Green for success:
            } else {
                throw new Error(data.error || "No invoice URL in response");
            }

        } catch (error) {
            console.error("Invoice generation error:", error);
            message.innerText = `Unable to generate invoice: ${error.message}`;
            message.style.color = "#f44336"; // Red for error:
        } finally {
            invoiceBtn.disabled = false;
        }
    });
</script>

<script>
    // CAPTCHA Logic:
    const CAPTCHA_BASE = "https://6wy6qva0yd.execute-api.us-east-1.amazonaws.com";
    let captchaToken = "";

    async function loadCaptcha() {
        const img = document.getElementById("captchaImg");
        const msg = document.getElementById("captchaMsg");
        img.src = "";
        msg.textContent = "Loading captcha...";
        msg.style.color = "#374151";
        try {
            const res = await fetch(`${CAPTCHA_BASE}/generate-captcha`);
            const data = await res.json();
            captchaToken = data.captcha_token || "";
            img.src = data.captcha_image_base64 || "";
            msg.textContent = "";
        } catch (e) {
            msg.textContent = "Could not load captcha. Click to retry.";
            msg.style.color = "#dc2626";
        }
    }

    async function verifyCaptcha(answer) {
        const msg = document.getElementById("captchaMsg");
        const input = document.getElementById("captchaInput");
        msg.textContent = "Verifying...";
        msg.style.color = "#374151";
        try {
            const res = await fetch(`${CAPTCHA_BASE}/validate-captcha`, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `token=${encodeURIComponent(captchaToken)}&answer=${encodeURIComponent(answer)}`
            });
            const data = await res.json();
            if (data.success === true || data.next_step === "continue") {
                captchaVerified = true;
                confirmPayBtn.disabled = false;
                input.disabled = true;
                document.getElementById("captchaRefreshBtn").disabled = true;
                msg.style.color = "#065f46";
                msg.textContent = "Captcha Verified";
            } else {
                msg.style.color = "#dc2626";
                msg.textContent = data.message || "Incorrect captcha. Try again.";
                input.value = "";
                captchaVerified = false;
                loadCaptcha();
            }
        } catch (e) {
            msg.style.color = "#dc2626";
            msg.textContent = "Verification error. Click to reload captcha.";
        }
    }

    // Reset captcha state (called from app.js when inputs change):
    function resetCaptchaState() {
        captchaVerified = false;
        captchaInitialized = false;
        captchaToken = "";
        document.getElementById("captchaSection").style.display = "none";
        document.getElementById("captchaImg").src = "";
        const input = document.getElementById("captchaInput");
        input.value = "";
        input.disabled = false;
        document.getElementById("captchaRefreshBtn").disabled = false;
        document.getElementById("captchaMsg").textContent = "";
        confirmPayBtn.disabled = true;
        confirmPayBtn.style.display = "none";
    }
</script>

</body>
</html>
